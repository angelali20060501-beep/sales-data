<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Graphing-Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Castoro+Titling&family=Castoro:ital@0;1&display=swap"
          rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
    .Bar-Graph-Page-title{
        font-family: 'Castoro Titling', serif;
        color: white;
        margin: 50px 40px 60px 40px;
        background-color: darkorange;
        padding: 10px 20px 5px 20px;
        display: inline-block;
    }
    .or{
        font-family: 'Castor', serif;
        color: white;
        position: absolute; top: 120px; left: 460px;
        font-size: 30px;
    }

    .or1{
        font-family: 'Castor', serif;
        color: white;
        position: absolute; top: 120px; left: 720px;
        font-size: 30px;
    }

    /* Display Area */
    .Bar-Graphing-Page-Display{
        background-color: white;
        position: absolute; top: 250px; left: 450px; height: 550px; width: 800px;
        z-index: -1;
    }
    #regionalBar {
        width: 100%;
        height: 100%;
        z-index: 1;
    }
    /* Company Dropdown Style*/
    .Bar-Company-Select{
        font-family: 'Castoro', serif;
        font-size: 20px;
        background-color: #704214;
        color: white;
        position: absolute; top: 160px; left: 48px;
    }
    /* Game Dropdown Style*/
    .Bar-Game-Select{
        font-family: 'Castoro', serif;
        font-size: 20px;
        background-color: #704214;
        color: white;
        position: absolute; top: 160px; left: 240px;
    }
    /* Year Dropdown Style*/
    .Bar-Year-Select{
        font-family: 'Castoro', serif;
        font-size: 20px;
        background-color: darkorange;
        color: white;
        position: absolute; top: 160px; left: 520px;
    }

    .Bar-text-edit{
        font-family: 'Castoro', serif;
        font-size: 20px;
        background-color: white;
        color: black;
        position: absolute; top: 300px; left: 48px;
    }
    .Bar-text-button{
        font-family: 'Castoro', serif;
        font-size: 20px;
        background-color: white;
        color: black;
        position: absolute; top: 350px; left: 48px;
        border-radius: 10px;
    }

    </style>
</head>
<body style="background-color: darkslategray;">
    <h1 class="Bar-Graph-Page-title">Categorical Data with Bar Graph!</h1>
    <div class="Bar-Graphing-Page-Display">
        <div id="regionalBar"></div>
    </div>

    <select class="Bar-Company-Select">
        <option value="">Select Company</option>
    </select>
    <div class="or"> OR </div>

    <select class="Bar-Game-Select">
        <option value="">Select Game</option>
    </select>
    <div class="or1"> OR </div>

    <select class="Bar-Year-Select">
        <option value="">Select Year</option>
    </select>

    <input type="text" class="Bar-text-edit" placeholder="Edit Graph Title!">
    <button class="Bar-text-button" onclick="editTitle()">Update Chart</button>

    <script>
        let globalDataset = [];

        $(document).ready(function() {
            // Load CSV using the correct relative path
            Papa.parse("../vgsales.csv", {
                download: true,
                header: true,
                dynamicTyping: true,
                skipEmptyLines: true,
                complete: function(results) {
                    globalDataset = results.data;
                    initPage();
                },
                error: function(error) {
                    console.error("Error loading CSV:", error);
                    alert("Could not load vgsales.csv.");
                }
            });
        });

        function initPage() {
            populateCompanies();
            populateYears();
            populateHighest(); // Draw initial all-time high graph

            $(".Bar-Company-Select").on("change", populateGames);
            $(".Bar-Game-Select").on("change", graphingGameBar);
            $(".Bar-Year-Select").on("change", graphingYearBar);
        }

        // Fill Company Dropdown
        function populateCompanies() {
            const companies = [...new Set(globalDataset.map(row => row.Publisher))]
                .filter(c => c && c !== "N/A").sort();
            const select = $(".Bar-Company-Select");
            select.empty().append(`<option value="">Select Company</option>`);
            companies.forEach(c => select.append(`<option value="${c}">${c}</option>`));
        }

        // Fill Year Dropdown (Sorted recent to oldest)
        function populateYears() {
            const years = [...new Set(globalDataset.map(row => row.Year))]
                .filter(y => y && y !== "N/A").sort((a, b) => b - a); 
            const select = $(".Bar-Year-Select");
            select.empty().append(`<option value="">Select Year</option>`);
            years.forEach(y => select.append(`<option value="${y}">${y}</option>`));
        }

        // Fill Games Dropdown when a Company is selected
        function populateGames() {
            const company = $(".Bar-Company-Select").val();
            if (!company) return;

            const games = [...new Set(globalDataset.filter(row => row.Publisher === company).map(row => row.Name))]
                .filter(g => g).sort();
            
            const select = $(".Bar-Game-Select");
            select.empty().append(`<option value="">Select Game</option>`);
            games.forEach(g => select.append(`<option value="${g}">${g}</option>`));
        }

        // 1. Initial Graph: Top 7 Highest Sellers Globally
        function populateHighest() {
            const sorted = [...globalDataset]
                .sort((a, b) => (b.Global_Sales || 0) - (a.Global_Sales || 0))
                .slice(0, 7);
            
            sorted.reverse(); // Reverse so highest is at the top of the bar chart

            const games = sorted.map(row => row.Name);
            const sales = sorted.map(row => row.Global_Sales);

            drawBarGraph(games, sales, "Highest Selling Games of All Time");
        }

        // 2. Graph: Regional Sales for a Specific Game
        function graphingGameBar() {
            const game = $(".Bar-Game-Select").val();
            if (!game) return;

            // Find the game's data
            const row = globalDataset.find(r => r.Name === game);
            if (!row) return;

            // Create regional breakdown
            const labels = ['Global', 'Other', 'Japan', 'EU', 'NA'];
            const sales = [row.Global_Sales, row.Other_Sales, row.JP_Sales, row.EU_Sales, row.NA_Sales].map(s => s || 0);

            labels.reverse(); 
            sales.reverse();

            drawBarGraph(labels, sales, `Regional Sales for ${game}`);
        }

        // 3. Graph: Top 7 Games for a Specific Year
        function graphingYearBar() {
            const year = $(".Bar-Year-Select").val();
            if (!year) return;

            const sorted = globalDataset.filter(r => r.Year == year)
                .sort((a, b) => (b.Global_Sales || 0) - (a.Global_Sales || 0))
                .slice(0, 7);
            
            sorted.reverse(); 

            const games = sorted.map(row => row.Name);
            const sales = sorted.map(row => row.Global_Sales);

            drawBarGraph(games, sales, `Video Game Sales for ${year}`);
        }

        // Helper function to draw the Plotly chart
        function drawBarGraph(yData, xData, title) {
            const graphData = [{
                x: xData,
                y: yData,
                type: 'bar',
                orientation: 'h',
                name: 'Sales',
            }];
            const layout = {
                title: {
                    text: title,
                    font: { size: 24, family: "Castoro, serif"},
                    x: 0.05,
                    xanchor: 'left'
                },
                xaxis: {
                    title: {text: 'Sales (Millions)', x: 0.2, xanchor: 'left'},
                    tickangle: 0,
                    automargin: true
                },
                yaxis: { title: '' }, // Blank because game names act as the labels
                margin: {
                    l: 250,  // Wide left margin so long game names don't get cut off
                    r: 20,
                    t: 100,
                    b: 50
                },
                width: 750,
                showlegend: false
            };

            Plotly.newPlot("regionalBar", graphData, layout);
        }

        function editTitle() {
            const title = document.getElementsByClassName("Bar-text-edit")[0].value;
            Plotly.relayout("regionalBar", {
                'title.text': title || "Default Title"
            });
        }
    </script>
</body>
</html>
