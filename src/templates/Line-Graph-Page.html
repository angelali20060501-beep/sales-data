<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Line-Graph-Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Castoro+Titling&family=Castoro:ital@0;1&display=swap"
          rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        .Line-Graph-Page-title{
            font-family: 'Castoro Titling', serif;
            color: white;
            margin: 50px 40px 60px 40px;
            background-color: darkorange;
            padding: 10px 20px 5px 20px;
            display: inline-block;
        }

        /* Display Area */
        .Line-Graphing-Page-Display{
            background-color: white;
            position: absolute; top: 250px; left: 450px; height: 550px; width: 800px;
            z-index: -1;
        }
        #regionalLine {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* Company Dropdown Style*/
        .Line-Company-Select{
            font-family: 'Castoro', serif;
            font-size: 20px;
            background-color: #704214;
            color: white;
            position: absolute; top: 160px; left: 48px;
        }
        /* Year Dropdown Style*/
        .Line-Year-Select{
            font-family: 'Castoro', serif;
            font-size: 20px;
            background-color: darkorange;
            color: white;
            position: absolute; top: 160px; left: 520px;
        }

        .Line-text-edit{
            font-family: 'Castoro', serif;
            font-size: 20px;
            background-color: white;
            color: black;
            position: absolute; top: 300px; left: 48px;
        }
        .Line-text-button{
            font-family: 'Castoro', serif;
            font-size: 20px;
            background-color: white;
            color: black;
            position: absolute; top: 350px; left: 48px;
            border-radius: 10px;
        }
    </style>
</head>
<body style="background-color: darkslategray;">
    <!-- Title -->
    <h1 class="Line-Graph-Page-title">Continuous Data with Line Graph!</h1>
    <!-- Display Area -->
    <div class="Line-Graphing-Page-Display">
        <div id="regionalLine"></div>
    </div>
    <!-- Company Dropdown -->
    <select class="Line-Company-Select">
        <option value="">Select Company</option>
    </select>

    <!-- Title Edit -->
    <input type="text" class="Line-text-edit" placeholder="Edit Graph Title!">
    <button class="Line-text-button" onclick="editTitle()">Update Chart</button>



    <script>
        let globalDataset = []; // This will hold your CSV data
    
        // 1. Load the CSV immediately when the page opens
        $(document).ready(function () {
            // IMPORTANT: Change this path if your CSV is named differently or in a different folder!
            Papa.parse("src/static/vgsales.csv", {
                download: true,
                header: true, 
                dynamicTyping: true,
                complete: function(results) {
                    globalDataset = results.data;
                    populateCompanies();
                }
            });
        });
    
        // 2. Extract unique companies for the dropdown
        function populateCompanies() {
            // Get all unique publishers, remove empty ones, and sort alphabetically
            const companies = [...new Set(globalDataset.map(row => row.Publisher))].filter(Boolean).sort();
            const select = $(".Line-Company-Select");
            select.empty(); 
            
            companies.forEach(company => {
                select.append(`<option value="${company}">${company}</option>`);
            });
    
            // Trigger the graph for the first company in the list
            $(".Line-Company-Select").on("change", graphingCompanyLine);
            if(companies.length > 0) graphingCompanyLine();
        }
    
        // 3. Filter data and draw the graph (Replacing your Python backend)
        function graphingCompanyLine() {
            const company = $(".Line-Company-Select").val();
    
            // Filter the dataset to only include rows for the selected company
            const companyData = globalDataset.filter(row => row.Publisher === company && row.Year);
    
            // Group the data by Year and sum up the Sales
            const salesByYear = {};
            companyData.forEach(row => {
                const year = row.Year;
                const sales = row.Global_Sales || 0; 
                
                if (!salesByYear[year]) salesByYear[year] = 0;
                salesByYear[year] += sales;
            });
    
            // Sort the years chronologically 
            const years = Object.keys(salesByYear).sort();
            const salesData = years.map(year => salesByYear[year]);
    
            // Draw the Plotly graph
            const graphData = [{x: years, y: salesData, type: 'scatter', mode:"line", name: "History Sales"}];
            const layout = {
                title: {
                    text: `${company} Historical Sales Trend`,
                    font: { size: 24, family: "Castoro, serif"},
                    x: 0.05,
                    xanchor: 'left'
                },
                xaxis: { title: 'Years', showgrid: false },
                yaxis: { title: 'Sales', showgrid: false },
                showlegend: false
            }
    
            Plotly.newPlot("regionalLine", graphData, layout);
        }
    
        async function editTitle() {
            const title = document.getElementsByClassName("Line-text-edit")[0].value;
            Plotly.relayout("regionalLine", {
                'title.text': title || "Default Title"
            });
        }
    </script>

</body>
</html>
